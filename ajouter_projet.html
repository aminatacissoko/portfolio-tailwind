<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ajouter un projet - Aminata</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans">

  <!-- HEADER -->
  <header class="bg-gray-900 shadow-lg sticky top-0 z-50">
    <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-violet-400">Aminata.dev</h1>
      <ul class="flex gap-6 text-sm font-medium">
        <li><a href="index.html" class="hover:text-violet-400 transition">Accueil</a></li>
        <li><a href="projets.html" class="hover:text-violet-400 transition">Projets</a></li>
        <li><a href="ajouter-projet.html" class="text-violet-400 font-bold">Ajouter un projet</a></li>
      </ul>
    </nav>
  </header>

  <!-- FORMULAIRE -->
  <section class="py-20 max-w-2xl mx-auto px-6">
    <h2 class="text-4xl font-bold text-violet-400 mb-12 text-center">Ajouter un projet</h2>
    <div class="bg-gray-800 rounded-2xl p-8 shadow-xl">

      <!-- Titre du projet -->
      <div class="mb-6">
        <label class="block text-gray-300 font-semibold mb-2">Titre du projet *</label>
        <input 
          type="text" 
          placeholder="Ex: Audit de sécurité"
          class="w-full bg-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-violet-500"
        />
      </div>

      <!-- Description -->
      <div class="mb-6">
        <label class="block text-gray-300 font-semibold mb-2">Description *</label>
        <textarea 
          rows="4"
          placeholder="Décris ton projet en quelques lignes..."
          class="w-full bg-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-violet-500"
        ></textarea>
      </div>

      <!-- Technologies -->
      <div class="mb-6">
        <label class="block text-gray-300 font-semibold mb-2">Technologies utilisées *</label>
        <input 
          type="text" 
          placeholder="Ex: HTML, CSS, JavaScript"
          class="w-full bg-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-violet-500"
        />
      </div>

      <!-- Icône -->
      <div class="mb-6">
        <label class="block text-gray-300 font-semibold mb-2">Icône du projet</label>
        <select class="w-full bg-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-violet-500">
          <option value="web"> Web</option>
          <option value="cybersécurité"> Cybersécurité</option>
          <option value="Sécurité"> Sécurité</option>
          <option value="Base de données"> Base de données</option>
          <option value="Système"> Système</option>
          <option value="Mobile"> Mobile</option>
          <option value="Intelligence Artificielle"> Intelligence Artificielle</option>
        </select>
      </div>

      <!-- Lien GitHub -->
      <div class="mb-8">
        <label class="block text-gray-300 font-semibold mb-2">Lien GitHub (optionnel)</label>
        <input 
          type="text" 
          placeholder="https://github.com/aminatacissoko/..."
          class="w-full bg-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-violet-500"
        />
      </div>

      <!-- Boutons -->
      <div class="flex gap-4">
        <a href="projets.html" class="flex-1 text-center bg-gray-600 hover:bg-gray-500 text-white font-bold py-3 rounded-xl transition text-lg">
          Annuler
        </a>
        <button class="flex-1 bg-violet-500 hover:bg-violet-600 text-white font-bold py-3 rounded-xl transition text-lg">
          Ajouter le projet 
        </button>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="bg-gray-900 text-center text-gray-400 py-6">
    <p>© 2024 Aminata Cissoko — Tous droits réservés</p>
  </footer>

</body>
</html>
